services:
  nodeskclaw-backend:
    volumes:
      - ./ee:/app/ee:ro
    environment:
      NODESKCLAW_EDITION: ee

  nodeskclaw-admin:
    build:
      context: ee/nodeskclaw-frontend
    depends_on:
      - nodeskclaw-backend
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${ADMIN_PORT:-8001}:80"
    restart: unless-stopped
